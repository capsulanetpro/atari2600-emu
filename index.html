<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Capsulanet Atari 2600 - Emulador</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
    /* Aquí irían tus estilos CSS personalizados.
       Por simplicidad, se han omitido, pero puedes añadir los tuyos. */
    body {
        background: #181818;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
    }
    canvas {
        background: #000;
        border: 2px solid #444;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    .controls {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
    }
    button {
        background: #333;
        border: 1px solid #555;
        color: #e0c090;
        font-family: monospace;
        font-size: 14px;
        padding: 8px 16px;
        cursor: pointer;
        border-radius: 6px;
    }
    button:active {
        background: #555;
    }
    .status {
        margin-top: 15px;
        color: #aaa;
        font-family: monospace;
        font-size: 12px;
        text-align: center;
    }
</style>
</head>
<body>
    <canvas id="gameCanvas" width="336" height="240"></canvas>
    <div class="controls">
        <button id="up">↑</button>
        <button id="down">↓</button>
        <button id="left">←</button>
        <button id="right">→</button>
        <button id="fire">FIRE</button>
        <button id="select">SELECT</button>
        <button id="reset">RESET</button>
        <input type="file" id="romFile" accept=".bin,.a26,.rom">
        <button id="loadRom">Cargar ROM</button>
    </div>
    <div class="status" id="status">Selecciona una ROM o carga la de prueba</div>

    <!-- Cargar la librería Javatari -->
    <script src="https://cdn.jsdelivr.net/npm/javatari@5.2.3/dist/javatari.min.js"></script>
    <script>
        // Configuración del emulador para que cargue ROMs desde tu repositorio
        let emulator = null;
        const canvas = document.getElementById('gameCanvas');
        const statusDiv = document.getElementById('status');
        const romFileInput = document.getElementById('romFile');
        const loadRomBtn = document.getElementById('loadRom');

        // Función para inicializar el emulador
        function initEmulator() {
            if (typeof Javatari === 'undefined') {
                statusDiv.innerText = 'Error: El emulador no se cargó correctamente.';
                return false;
            }
            emulator = new Javatari(canvas);
            statusDiv.innerText = 'Emulador listo. Carga una ROM.';
            return true;
        }

        // Cargar una ROM desde un archivo (arrayBuffer)
        async function loadRomFromData(romData) {
            if (!emulator && !initEmulator()) return;
            try {
                emulator.loadCartridge(romData);
                statusDiv.innerText = 'ROM cargada correctamente. ¡A jugar!';
            } catch(e) {
                statusDiv.innerText = 'Error al cargar ROM: ' + e.message;
                console.error(e);
            }
        }

        // Cargar una ROM desde una URL remota
        async function loadRomFromUrl(url) {
            statusDiv.innerText = 'Descargando ROM...';
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const romData = await response.arrayBuffer();
                await loadRomFromData(romData);
            } catch(e) {
                statusDiv.innerText = 'Error descargando ROM: ' + e.message;
            }
        }

        // Cargar una ROM desde un archivo local (seleccionado por el usuario)
        function loadRomFromFile(file) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const romData = e.target.result;
                await loadRomFromData(romData);
            };
            reader.readAsArrayBuffer(file);
        }

        // Vincular los botones de control a eventos de teclado
        function bindControls() {
            const keyMap = {
                up: 38, down: 40, left: 37, right: 39,
                fire: 17,  // Ctrl
                select: 16, // Shift
                reset: 13   // Enter
            };
            for (const [id, keyCode] of Object.entries(keyMap)) {
                const btn = document.getElementById(id);
                if (!btn) continue;
                btn.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    const event = new KeyboardEvent('keydown', { keyCode, bubbles: true });
                    canvas.dispatchEvent(event);
                });
                btn.addEventListener('mouseup', (e) => {
                    e.preventDefault();
                    const event = new KeyboardEvent('keyup', { keyCode, bubbles: true });
                    canvas.dispatchEvent(event);
                });
                // Soporte para pantallas táctiles
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const event = new KeyboardEvent('keydown', { keyCode, bubbles: true });
                    canvas.dispatchEvent(event);
                });
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    const event = new KeyboardEvent('keyup', { keyCode, bubbles: true });
                    canvas.dispatchEvent(event);
                });
            }
        }

        // Manejar la selección de archivo local
        romFileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) loadRomFromFile(e.target.files[0]);
        });
        loadRomBtn.addEventListener('click', () => romFileInput.click());

        // Inicializar el emulador y cargar una ROM de prueba desde tu repositorio
        window.addEventListener('load', () => {
            if (initEmulator()) {
                bindControls();
                // Cambia el nombre del archivo por el de tu ROM de prueba
                const testRomUrl = 'roms/Adventure Island (USA).bin';
                loadRomFromUrl(testRomUrl).catch(() => {
                    statusDiv.innerText = 'No se encontró ROM de prueba. Selecciona una manualmente.';
                });
            }
        });
    </script>
</body>
</html>
