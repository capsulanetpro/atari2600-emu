<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Capsulanet · Atari 2600 (Capsulanet Edition)</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  /* ========== ESTILOS CYBERPUNK (completos, no los repito por brevedad) ========== */
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;background-image:radial-gradient(ellipse at 30% 20%,#001a00 0%,#000 100%);min-height:100vh;padding:1.5rem;font-family:'Courier New',monospace;display:flex;justify-content:center;align-items:center}
  .cyber-window{max-width:1200px;width:100%;background:#0a0f0a;border:3px solid #00ff41;border-radius:28px;box-shadow:0 0 20px rgba(0,255,65,.3);overflow:hidden;padding:1.5rem}
  .cyber-grid{display:flex;flex-wrap:wrap;gap:2rem;justify-content:center;align-items:flex-start}
  .atari-console{flex:1.2;min-width:320px;background:#0a0f0a;border:2px solid #00ff41;border-radius:24px;padding:1.2rem;box-shadow:0 0 15px rgba(0,255,65,.2)}
  .wood-panel{background:#0a1a0a;border-bottom:2px solid #00ff41;border-radius:16px 16px 0 0;padding:8px 12px;margin:-1.2rem -1.2rem 1rem -1.2rem;text-align:center;font-family:monospace;font-size:.8rem;font-weight:bold;letter-spacing:3px;color:#00ff41;text-shadow:0 0 3px #00ff41}
  .wood-panel .console-title{display:block;margin-bottom:4px}
  .wood-panel .edition-link{display:block;color:#00ff41;text-decoration:none;transition:text-shadow .2s}
  .wood-panel .edition-link:hover{text-shadow:0 0 8px #00ff41;text-decoration:underline}
  .screen-bezel{background:#010701;border:1px solid #2a6e2a;border-radius:16px;padding:12px;margin-bottom:1rem;box-shadow:inset 0 0 10px rgba(0,0,0,.8),0 0 0 2px #00ff4122;position:relative}
  #gameCanvas{background:#000;width:100%;height:auto;aspect-ratio:336/240;display:block;border-radius:8px;image-rendering:crisp-edges;image-rendering:pixelated}
  .idle{position:absolute;inset:0;background:#0a1a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;pointer-events:none;transition:opacity .4s;border-radius:8px;z-index:5}
  .idle.hidden{opacity:0}
  .idle-txt{font-family:'Press Start 2P',monospace;font-size:9px;color:#00ff41;text-align:center;line-height:1.8;text-shadow:0 0 3px #00ff41}
  .controls{display:flex;flex-direction:column;gap:1rem;margin-top:.5rem}
  .joystick-area{display:flex;justify-content:center;gap:2rem;align-items:center;flex-wrap:wrap}
  .joystick{position:relative;width:110px;height:110px;background:#0a0f0a;border:2px solid #00ff41;border-radius:50%;box-shadow:0 0 10px rgba(0,255,65,.3)}
  .joystick-stick{position:absolute;width:50px;height:50px;background:#00ff41;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px #00ff41}
  .dir-btn{position:absolute;background:transparent;border:none;cursor:pointer;width:36px;height:36px;z-index:5}
  #up{top:0;left:50%;transform:translateX(-50%)}
  #down{bottom:0;left:50%;transform:translateX(-50%)}
  #left{left:0;top:50%;transform:translateY(-50%)}
  #right{right:0;top:50%;transform:translateY(-50%)}
  .fire-buttons{display:flex;gap:1.5rem}
  .fire{width:65px;height:65px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#00ff41,#006600);border:2px solid #00ff41;box-shadow:0 4px 0 #003300,0 6px 12px rgba(0,0,0,.5);cursor:pointer;font-family:monospace;font-weight:bold;color:#000;font-size:.9rem;transition:transform .05s,box-shadow .05s}
  .fire:active,.fire.pr{transform:translateY(4px);box-shadow:0 1px 0 #003300,0 4px 8px black}
  .select-reset{display:flex;justify-content:center;gap:2rem;margin-top:.5rem}
  .sys-btn{background:#0a0f0a;border:1px solid #00ff41;border-radius:40px;padding:6px 18px;color:#00ff41;font-family:monospace;font-size:.7rem;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.3);transition:.05s linear}
  .sys-btn:active,.sys-btn.pr{background:#00ff41;color:#000;box-shadow:0 0 10px #00ff41}
  .panel{flex:1;min-width:280px;display:flex;flex-direction:column;gap:1rem}
  .pbox{background:#051005;border:1px solid #2a6e2a;border-radius:16px;overflow:hidden}
  .phead{padding:10px 14px;background:#030903;border-bottom:1px solid #00ff41;font-family:monospace;font-weight:bold;font-size:.75rem;color:#00ff41;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center}
  .reset-btn{background:transparent;border:1px solid #2a6e2a;border-radius:20px;padding:3px 10px;color:#88ff88;font-family:monospace;font-size:.65rem;cursor:pointer}
  .reset-btn:hover{border-color:#00ff41;color:#00ff41}
  .search-box{padding:8px 12px;border-bottom:1px solid #2a6e2a}
  .search-box input{width:100%;background:#010701;border:1px solid #2a6e2a;border-radius:60px;padding:6px 12px;color:#00ff41;font-family:monospace;font-size:.7rem;outline:none}
  .search-box input:focus{border-color:#00ff41}
  .rlist{max-height:240px;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:4px}
  .rlist::-webkit-scrollbar{width:4px}
  .rlist::-webkit-scrollbar-thumb{background:#2a6e2a;border-radius:4px}
  .ritem{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:12px;cursor:pointer;border:1px solid transparent;transition:.1s;background:#010701}
  .ritem:hover{border-color:#2a6e2a;background:#0a1a0a}
  .ritem.active{border-color:#00ff41;background:#0a2a0a}
  .badge{font-size:.6rem;padding:2px 6px;border-radius:30px;background:#0a2a0a;border:1px solid #2a6e2a;color:#88ff88}
  .rname{flex:1;font-size:.7rem;color:#bbffbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .play-count{font-size:.6rem;background:#0a1a0a;border-radius:20px;padding:0 6px;color:#88ff88}
  .fav-star{font-size:1rem;cursor:pointer;color:#555;transition:.1s}
  .fav-star.favorited{color:#ffcc00;text-shadow:0 0 3px #ffcc00}
  .sbar{display:flex;align-items:center;gap:8px;padding:6px 12px;border-top:1px solid #2a6e2a;font-size:.65rem;color:#88ff88}
  .sdot{width:8px;height:8px;border-radius:50%;background:#333}
  .sdot.on{background:#00ff41;box-shadow:0 0 5px #00ff41}
  .load-local-area{padding:12px;display:flex;flex-direction:column;gap:10px}
  .btn-local{background:#0a1a0a;border:1px solid #2a6e2a;border-radius:40px;padding:8px;color:#00ff41;font-family:monospace;font-size:.7rem;cursor:pointer;text-align:center}
  .btn-local:hover{border-color:#00ff41;background:#0a2a0a}
  .dropz{border:1px dashed #2a6e2a;border-radius:16px;padding:8px;text-align:center;font-size:.65rem;color:#88ff88;position:relative;cursor:pointer}
  .dropz input{position:absolute;inset:0;opacity:0;cursor:pointer}
  .ctrlg{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px}
  .crow{display:flex;align-items:center;gap:8px}
  kbd{background:#010701;border:1px solid #2a6e2a;border-radius:4px;padding:2px 6px;font-family:monospace;font-size:.65rem;color:#00ff41}
  .clbl{color:#bbffbb;font-size:.65rem}
  .footer-link{text-align:center;margin-top:8px;font-size:.7rem}
  .footer-link a{color:#88ff88;text-decoration:none}
  .footer-link a:hover{color:#00ff41}
  @media (max-width:780px){
    .cyber-grid{flex-direction:column;align-items:center}
    .atari-console{min-width:auto;width:100%}
    .panel{width:100%}
    .joystick{width:90px;height:90px}
    .joystick-stick{width:40px;height:40px}
    .fire{width:55px;height:55px;font-size:.7rem}
  }
</style>
</head>
<body>
<div class="cyber-window">
  <div class="cyber-grid">
    <div class="atari-console">
      <div class="wood-panel">
        <span class="console-title">🔻 ATARI 2600 🔻</span>
        <a href="https://capsulanet.blogspot.com" target="_blank" rel="noopener noreferrer" class="edition-link">CAPSULANET EDITION</a>
      </div>
      <div class="screen-bezel" style="position:relative;">
        <canvas id="gameCanvas" width="336" height="240"></canvas>
        <div class="idle" id="idle">
          <div class="idle-txt">CAPSULANET<br>ATARI 2600<br><span style="font-size:6px;">✦ SELECCIONA UN JUEGO ✦</span></div>
        </div>
      </div>
      <div class="controls">
        <div class="joystick-area">
          <div class="joystick">
            <div class="joystick-stick"></div>
            <button class="dir-btn" id="up"></button>
            <button class="dir-btn" id="down"></button>
            <button class="dir-btn" id="left"></button>
            <button class="dir-btn" id="right"></button>
          </div>
          <div class="fire-buttons"><button class="fire" id="fire-btn">FIRE</button></div>
        </div>
        <div class="select-reset">
          <button class="sys-btn" id="select-btn">SELECT</button>
          <button class="sys-btn" id="reset-btn">RESET</button>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="pbox">
        <div class="phead">📀 CARTRIDGES <button class="reset-btn" id="resetGameBtn">⟳ RESET</button></div>
        <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Buscar juego..."></div>
        <div class="rlist" id="romList"><div style="padding:20px;text-align:center;color:#2a6e2a;">Cargando lista...</div></div>
        <div class="sbar"><div class="sdot" id="sdot"></div><span id="sTxt">Inicializando...</span></div>
      </div>
      <div class="pbox">
        <div class="phead">💾 CARGAR ROM LOCAL</div>
        <div class="load-local-area">
          <button class="btn-local" id="localRomBtn">📂 SELECCIONAR .A26 / .BIN</button>
          <div class="dropz" id="dz">O arrastra el archivo aquí<input type="file" accept=".a26,.bin,.rom" id="fileInput"></div>
        </div>
      </div>
      <div class="pbox">
        <div class="phead">🎮 TECLADO / TÁCTIL</div>
        <div class="ctrlg">
          <div class="crow"><kbd>←↑↓→</kbd><span class="clbl">Joystick</span></div>
          <div class="crow"><kbd>Ctrl / Z</kbd><span class="clbl">FIRE</span></div>
          <div class="crow"><kbd>Shift / X</kbd><span class="clbl">SELECT</span></div>
          <div class="crow"><kbd>Enter</kbd><span class="clbl">RESET</span></div>
        </div>
      </div>
      <div class="footer-link"><a href="https://capsulanet.blogspot.com" target="_blank" rel="noopener noreferrer">capsulanet.blogspot.com</a></div>
    </div>
  </div>
</div>

<script>
  // Cargar el emulador desde archivo local (debe ser el correcto)
  (function(){
    let emulatorReady = false;
    let pendingLaunch = null;
    let allRoms = [];
    let activeIdx = -1;
    let currentEmulator = null;
    let searchTerm = '';
    let stats = JSON.parse(localStorage.getItem('atari_stats')) || {};
    let favorites = JSON.parse(localStorage.getItem('atari_favorites')) || [];

    const canvas = document.getElementById('gameCanvas');
    const romListEl = document.getElementById('romList');
    const sTxt = document.getElementById('sTxt');
    const sdot = document.getElementById('sdot');
    const idleDiv = document.getElementById('idle');
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dz');
    const localRomBtn = document.getElementById('localRomBtn');
    const resetGameBtn = document.getElementById('resetGameBtn');
    const searchInput = document.getElementById('searchInput');

    function setStatus(msg, isOn){
      sTxt.textContent = msg;
      sdot.className = 'sdot' + (isOn ? ' on' : '');
    }

    function escapeHtml(str){
      return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
    }

    function renderRomList(){
      const filtered = allRoms.filter(rom => rom.name.toLowerCase().includes(searchTerm.toLowerCase()));
      romListEl.innerHTML = '';
      if(filtered.length === 0){
        romListEl.innerHTML = '<div style="padding:20px;text-align:center;color:#2a6e2a;">No hay juegos</div>';
        return;
      }
      filtered.forEach((rom)=>{
        const originalIndex = allRoms.indexOf(rom);
        const item = document.createElement('div');
        item.className = 'ritem' + (originalIndex === activeIdx ? ' active' : '');
        const playCount = stats[rom.id] || 0;
        const favClass = favorites.includes(rom.id) ? 'favorited' : '';
        item.innerHTML = `
          <span class="badge">A2600</span>
          <span class="rname">${escapeHtml(rom.name)}</span>
          <span class="play-count">${playCount}</span>
          <span class="fav-star ${favClass}">★</span>
        `;
        const favStar = item.querySelector('.fav-star');
        favStar.addEventListener('click',(e)=>{
          e.stopPropagation();
          if(favorites.includes(rom.id)) favorites = favorites.filter(id=>id!==rom.id);
          else favorites.push(rom.id);
          localStorage.setItem('atari_favorites',JSON.stringify(favorites));
          renderRomList();
        });
        item.addEventListener('click',()=>{
          if(!emulatorReady){
            setStatus('Emulador aún no listo. Espera...',false);
            pendingLaunch = originalIndex;
            return;
          }
          launchRom(originalIndex);
        });
        romListEl.appendChild(item);
      });
    }

    function cleanEmulator(){
      if(currentEmulator){
        try{ currentEmulator.destroy(); }catch(e){}
        currentEmulator = null;
      }
      idleDiv.classList.remove('hidden');
    }

    async function launchRom(index){
      if(!emulatorReady){
        setStatus('El emulador no está disponible. Recarga la página.',false);
        return;
      }
      const rom = allRoms[index];
      if(!rom) return;
      activeIdx = index;
      renderRomList();
      setStatus('Cargando '+rom.name+'…',false);
      cleanEmulator();
      try{
        const response = await fetch(rom.url);
        if(!response.ok) throw new Error(`HTTP ${response.status}`);
        const romData = await response.arrayBuffer();
        if(typeof Javatari !== 'function'){
          throw new Error('Javatari no es un constructor. El archivo js/javatari.js es incorrecto.');
        }
        currentEmulator = new Javatari(canvas);
        currentEmulator.loadCartridge(romData);
        idleDiv.classList.add('hidden');
        setStatus('▶ '+rom.name,true);
        stats[rom.id] = (stats[rom.id]||0)+1;
        localStorage.setItem('atari_stats',JSON.stringify(stats));
        bindGamepadButtons();
      }catch(err){
        console.error(err);
        setStatus('Error al cargar ROM: '+err.message,false);
        idleDiv.classList.remove('hidden');
      }
    }

    function bindGamepadButtons(){
      const keys = { 'up':38, 'down':40, 'left':37, 'right':39, 'fire-btn':17, 'select-btn':16, 'reset-btn':13 };
      for(const [id, keyCode] of Object.entries(keys)){
        const btn = document.getElementById(id);
        if(!btn) continue;
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        const sendEvent = (type)=>{
          const ev = new KeyboardEvent(type, { keyCode, bubbles:true, cancelable:true });
          document.dispatchEvent(ev);
          canvas.dispatchEvent(ev);
        };
        newBtn.addEventListener('mousedown',(e)=>{
          e.preventDefault();
          newBtn.classList.add('pr');
          sendEvent('keydown');
        });
        newBtn.addEventListener('mouseup',(e)=>{
          e.preventDefault();
          newBtn.classList.remove('pr');
          sendEvent('keyup');
        });
        newBtn.addEventListener('touchstart',(e)=>{
          e.preventDefault();
          newBtn.classList.add('pr');
          sendEvent('keydown');
        },{ passive:false });
        newBtn.addEventListener('touchend',(e)=>{
          e.preventDefault();
          newBtn.classList.remove('pr');
          sendEvent('keyup');
        });
      }
    }

    async function addLocalRom(file){
      if(!file) return;
      const ext = file.name.split('.').pop().toLowerCase();
      if(!['a26','bin','rom'].includes(ext)){
        setStatus('Formato no soportado',false);
        setTimeout(()=>setStatus('Carga una ROM válida',false),1500);
        return;
      }
      const name = file.name.replace(/\.(a26|bin|rom)$/i,'');
      const url = URL.createObjectURL(file);
      const newRom = { name, url, id:'local_'+Date.now()+'_'+name, isLocal:true };
      allRoms.push(newRom);
      renderRomList();
      launchRom(allRoms.length-1);
    }

    async function fetchGamesFromGitHub(){
      const GITHUB_USER = 'capsulanetpro';
      const GITHUB_REPO = 'atari2600-emu';
      const GITHUB_BRANCH = 'main';
      const ROMS_PATH = 'roms';
      const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${ROMS_PATH}/`;
      const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${ROMS_PATH}`;
      try{
        setStatus('Cargando lista de juegos desde GitHub...',false);
        const response = await fetch(apiUrl);
        if(!response.ok) throw new Error(`Error ${response.status}`);
        const files = await response.json();
        const romsFromGitHub = files
          .filter(f => f.name.toLowerCase().endsWith('.bin') || f.name.toLowerCase().endsWith('.a26') || f.name.toLowerCase().endsWith('.rom'))
          .map(file => ({
            name: file.name.replace(/\.(bin|a26|rom)$/i,''),
            url: RAW_BASE + encodeURIComponent(file.name),
            id: file.name,
            isLocal: false
          }));
        romsFromGitHub.sort((a,b)=>a.name.localeCompare(b.name));
        const localRoms = allRoms.filter(r=>r.isLocal);
        allRoms = [...romsFromGitHub, ...localRoms];
        renderRomList();
        setStatus(`Lista cargada: ${romsFromGitHub.length} juegos`, true);
      }catch(error){
        console.error(error);
        setStatus('Error al cargar lista de juegos.', false);
        romListEl.innerHTML = '<div style="padding:20px;text-align:center;color:#2a6e2a;">Error al conectar con GitHub.<br>Verifica tu conexión.</div>';
      }
    }

    // Cargar el emulador desde el archivo local
    const script = document.createElement('script');
    script.src = 'js/javatari.js';
    script.onload = () => {
      setTimeout(() => {
        if(typeof Javatari !== 'undefined' && typeof Javatari === 'function'){
          emulatorReady = true;
          setStatus('Emulador listo.', true);
          fetchGamesFromGitHub().then(() => {
            if(pendingLaunch !== null){
              launchRom(pendingLaunch);
              pendingLaunch = null;
            }
          });
        } else {
          setStatus('ERROR: El archivo js/javatari.js no es válido.', false);
          romListEl.innerHTML = '<div style="padding:20px;text-align:center;color:#ff4444;">El archivo del emulador es incorrecto.<br>Descarga el archivo correcto desde el repositorio oficial.</div>';
          fetchGamesFromGitHub();
        }
      }, 200);
    };
    script.onerror = () => {
      setStatus('ERROR: No se pudo cargar js/javatari.js', false);
      romListEl.innerHTML = '<div style="padding:20px;text-align:center;color:#ff4444;">No se encuentra el archivo del emulador.<br>Asegúrate de que existe en /js/javatari.js</div>';
      fetchGamesFromGitHub();
    };
    document.head.appendChild(script);

    // Eventos
    searchInput.addEventListener('input', (e)=>{ searchTerm = e.target.value; renderRomList(); });
    resetGameBtn.addEventListener('click', ()=>{ if(activeIdx>=0 && emulatorReady) launchRom(activeIdx); });
    localRomBtn.addEventListener('click', ()=>fileInput.click());
    fileInput.addEventListener('change', (e)=>{ if(e.target.files.length) addLocalRom(e.target.files[0]); fileInput.value=''; });
    dropZone.addEventListener('dragover', (e)=>{ e.preventDefault(); dropZone.classList.add('dg'); });
    dropZone.addEventListener('dragleave', ()=>dropZone.classList.remove('dg'));
    dropZone.addEventListener('drop', (e)=>{ e.preventDefault(); dropZone.classList.remove('dg'); if(e.dataTransfer.files[0]) addLocalRom(e.dataTransfer.files[0]); });
  })();
</script>
</body>
</html>
